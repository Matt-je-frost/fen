name = "fen-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
account_id = "16338cf313785561a79f39fcfe018ee3"
no_bundle = true

# Fen's 4-hour wake cycle
[triggers]
crons = ["0 */4 * * *"]

# KV namespace
[[kv_namespaces]]
binding = "FEN_STATE"
id = "981059d0cdbc451f936fd60525922f73"

# Secrets via wrangler secret put or CF dashboard
# ANTHROPIC_API_KEY
# SUPABASE_KEY
# MONDAY_API_KEY
# CLOUDFLARE_API_TOKEN
# CLOUDFLARE_ACCOUNT_ID
# WORKER_NAME
