name = "fen-worker"
main = "worker.js"
compatibility_date = "2024-01-01"
account_id = "16338cf313785561a79f39fcfe018ee3"

# Fen's 4-hour wake cycle - defined here so deploys never strip it
[triggers]
crons = ["0 */4 * * *"]

# KV namespace for fast in-worker state
[[kv_namespaces]]
binding = "FEN_STATE"
id = "981059d0cdbc451f936fd60525922f73"

# Secrets are configured via `wrangler secret put` or the CF dashboard
# ANTHROPIC_API_KEY
# SUPABASE_KEY
# MONDAY_API_KEY
# CLOUDFLARE_API_TOKEN
# CLOUDFLARE_ACCOUNT_ID
# WORKER_NAME
